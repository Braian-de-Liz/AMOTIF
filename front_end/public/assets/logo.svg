<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <linearGradient id="gradPrincipal" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e2c;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6b8e4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fb08f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradClaro" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b8e4d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8fb08f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="600" height="600" fill="#f4f9f4"/>

  <g fill="url(#gradPrincipal)" stroke="none">

    <!-- ===== CLAVE DE SOL REAL ===== -->
    <!-- Corpo principal da clave - formato orgânico -->
    <path d="
      M 300 120
      C 320 120 340 140 340 165
      C 340 190 320 210 300 215
      C 280 220 260 205 255 185
      C 250 165 260 140 280 130
      C 290 125 300 120 300 120
      Z
    " fill="url(#gradPrincipal)"/>

    <!-- Laço superior da clave -->
    <path d="
      M 300 120
      C 310 110 325 105 335 115
      C 345 125 340 145 330 150
      C 320 155 310 145 310 135
      C 310 125 320 120 330 125
    " fill="url(#gradPrincipal)"/>

    <!-- Haste vertical da clave -->
    <rect x="294" y="100" width="12" height="280" rx="6" fill="url(#gradPrincipal)"/>

    <!-- Círculos concênthicos do centro -->
    <circle cx="300" cy="300" r="70" fill="url(#gradPrincipal)"/>
    <circle cx="300" cy="300" r="50" fill="#f4f9f4"/>
    <circle cx="300" cy="300" r="35" fill="url(#gradPrincipal)"/>
    <circle cx="300" cy="300" r="20" fill="#f4f9f4"/>

    <!-- Curva inferior da clave (o "rabo") -->
    <path d="
      M 300 480
      C 275 480 255 460 255 435
      C 255 410 280 400 300 410
      C 320 420 335 445 325 465
      C 315 485 305 480 300 480
      Z
    " fill="url(#gradPrincipal)"/>

    <!-- ===== BRAÇO CURVO - MICROFONE (sup. esquerda) ===== -->
    <path d="
      M 265 250
      C 230 220 180 180 150 150
      C 130 130 110 115 100 105
    " stroke="url(#gradPrincipal)" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Cabeca do microfone (redondo com grade) -->
    <circle cx="95" cy="90" r="40" fill="url(#gradPrincipal)"/>
    <!-- Grade diagonal -->
    <line x1="70" y1="70" x2="120" y2="55" stroke="#f4f9f4" stroke-width="3" opacity="0.6"/>
    <line x1="68" y1="82" x2="122" y2="67" stroke="#f4f9f4" stroke-width="3" opacity="0.6"/>
    <line x1="66" y1="94" x2="124" y2="79" stroke="#f4f9f4" stroke-width="3" opacity="0.6"/>
    <line x1="68" y1="106" x2="126" y2="91" stroke="#f4f9f4" stroke-width="3" opacity="0.6"/>
    <line x1="70" y1="118" x2="128" y2="103" stroke="#f4f9f4" stroke-width="3" opacity="0.6"/>

    <!-- ===== BRAÇO CURVO - TROMPETE (sup. direita) ===== -->
    <path d="
      M 335 250
      C 370 220 420 180 450 150
      C 470 130 490 115 500 105
    " stroke="url(#gradPrincipal)" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Corpo do trompete -->
    <path d="
      M 495 85
      L 530 45
      L 545 60
      L 515 95
      Z
    " fill="url(#gradPrincipal)"/>

    <!-- Campânula -->
    <path d="
      M 500 70
      C 520 50 550 30 560 40
      C 570 50 550 75 530 85
      C 510 95 500 85 500 70
      Z
    " fill="url(#gradPrincipal)"/>

    <!-- Nota musical no trompete -->
    <circle cx="540" cy="50" r="7" fill="#f4f9f4"/>
    <rect x="546" y="30" width="3" height="22" fill="#f4f9f4"/>

    <!-- Válvulas -->
    <circle cx="490" cy="95" r="5" fill="url(#gradPrincipal)" stroke="#f4f9f4" stroke-width="2"/>
    <circle cx="500" cy="85" r="5" fill="url(#gradPrincipal)" stroke="#f4f9f4" stroke-width="2"/>
    <circle cx="510" cy="75" r="5" fill="url(#gradPrincipal)" stroke="#f4f9f4" stroke-width="2"/>

    <!-- ===== BRAÇO CURVO - VIOLÃO (direita) ===== -->
    <path d="
      M 370 300
      C 400 300 440 300 470 300
    " stroke="url(#gradPrincipal)" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Corpo circular do violão -->
    <circle cx="510" cy="300" r="55" fill="none" stroke="url(#gradPrincipal)" stroke-width="14"/>
    <circle cx="510" cy="300" r="35" fill="none" stroke="url(#gradPrincipal)" stroke-width="4"/>

    <!-- Cordas -->
    <line x1="455" y1="292" x2="565" y2="292" stroke="url(#gradPrincipal)" stroke-width="2.5"/>
    <line x1="455" y1="300" x2="565" y2="300" stroke="url(#gradPrincipal)" stroke-width="2.5"/>
    <line x1="455" y1="308" x2="565" y2="308" stroke="url(#gradPrincipal)" stroke-width="2.5"/>

    <!-- Boca do violão -->
    <circle cx="510" cy="300" r="10" fill="url(#gradPrincipal)"/>

    <!-- ===== BRAÇO CURVO - BUMBO (inferior) ===== -->
    <path d="
      M 300 370
      C 300 400 300 440 300 470
    " stroke="url(#gradPrincipal)" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Corpo do bumbo (cilíndrico inclinado) -->
    <ellipse cx="300" cy="510" rx="60" ry="35" fill="url(#gradPrincipal)"/>
    <ellipse cx="300" cy="498" rx="60" ry="14" fill="url(#gradClaro)"/>

    <!-- Notas musicais no bumbo -->
    <circle cx="275" cy="505" r="6" fill="#f4f9f4"/>
    <rect x="280" y="488" width="2.5" height="19" fill="#f4f9f4"/>

    <circle cx="315" cy="500" r="5" fill="#f4f9f4"/>
    <rect x="319" y="486" width="2" height="16" fill="#f4f9f4"/>

    <circle cx="295" cy="518" r="4" fill="#f4f9f4"/>
    <rect x="298" y="505" width="2" height="14" fill="#f4f9f4"/>

    <!-- ===== BRAÇO CURVO - TECLADO (esquerda) ===== -->
    <path d="
      M 235 300
      C 200 300 160 300 130 300
    " stroke="url(#gradPrincipal)" stroke-width="14" fill="none" stroke-linecap="round"/>

    <!-- Corpo do teclado (arredondado) -->
    <path d="
      M 90 260
      C 60 260 40 280 40 310
      C 40 340 60 360 90 360
      L 130 360
      L 130 260
      Z
    " fill="url(#gradPrincipal)"/>

    <!-- Teclas brancas -->
    <rect x="50" y="270" width="12" height="70" rx="2" fill="#f4f9f4" opacity="0.5"/>
    <rect x="65" y="270" width="12" height="70" rx="2" fill="#f4f9f4" opacity="0.5"/>
    <rect x="80" y="270" width="12" height="70" rx="2" fill="#f4f9f4" opacity="0.5"/>
    <rect x="95" y="270" width="12" height="70" rx="2" fill="#f4f9f4" opacity="0.5"/>
    <rect x="110" y="270" width="12" height="70" rx="2" fill="#f4f9f4" opacity="0.5"/>

    <!-- Teclas pretas -->
    <rect x="59" y="270" width="8" height="42" rx="1" fill="#2c3e2c" opacity="0.4"/>
    <rect x="74" y="270" width="8" height="42" rx="1" fill="#2c3e2c" opacity="0.4"/>
    <rect x="101" y="270" width="8" height="42" rx="1" fill="#2c3e2c" opacity="0.4"/>
    <rect x="116" y="270" width="8" height="42" rx="1" fill="#2c3e2c" opacity="0.4"/>

    <!-- Notas musicais no teclado -->
    <circle cx="60" cy="345" r="5" fill="#f4f9f4" opacity="0.7"/>
    <rect x="64" y="330" width="2" height="17" fill="#f4f9f4" opacity="0.7"/>

    <circle cx="105" cy="350" r="4" fill="#f4f9f4" opacity="0.7"/>
    <rect x="108" y="337" width="2" height="15" fill="#f4f9f4" opacity="0.7"/>

    <!-- ===== NOTAS DECORATIVAS ===== -->
    <!-- Nota superior -->
    <circle cx="350" cy="170" r="6" fill="url(#gradPrincipal)"/>
    <rect x="355" y="152" width="2.5" height="20" fill="url(#gradPrincipal)"/>
    <path d="M 355 152 Q 365 156 362 165" stroke="url(#gradPrincipal)" stroke-width="2.5" fill="none"/>

    <!-- Nota inferior esquerda -->
    <circle cx="200" cy="420" r="5" fill="url(#gradPrincipal)"/>
    <rect x="204" y="405" width="2" height="17" fill="url(#gradPrincipal)"/>

    <!-- Nota inferior direita -->
    <circle cx="380" cy="430" r="5" fill="url(#gradPrincipal)"/>
    <rect x="384" y="415" width="2" height="17" fill="url(#gradPrincipal)"/>

  </g>
</svg>
